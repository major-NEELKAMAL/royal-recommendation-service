spring.application.name=royawl-recommendation-service

# Register with Eureka
eureka.client.service-url.defaultZone=http://192.168.1.8:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.main.web-application-type=reactive
eureka.client.enabled=true
eureka.client.jersey.enabled=false

server.port=9081
application.recommendation.model.path=/home/neelkamal/Documents/app/data/royawl/recommendationModel/

# ====================== KAFKA CONFIGURATION ======================

# Producer Configuration
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.linger.ms=5
spring.kafka.producer.batch.size=16384
spring.kafka.producer.buffer.memory=33554432

# Consumer Configuration (Common)
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.enable-auto-commit=false

# ====================== TOPICS ======================
app.kafka.topic.engagement-counts=engagement-counts
app.kafka.topic.push-notifications=push-notifications
app.kafka.topic.recommendation-reload=recommendation-reload

# ====================== CONSUMER GROUPS ======================
app.kafka.consumer.group.sse=webflux-sse-group
app.kafka.consumer.group.notification=notification-group
app.kafka.consumer.group.recommendation-reload=recommendation-reload-group

# Listener Configuration
spring.kafka.listener.concurrency=3
spring.kafka.listener.ack-mode=manual-immediate
